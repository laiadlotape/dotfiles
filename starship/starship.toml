# Starship prompt configuration
# https://starship.rs/config/

# Timeout for commands that starship runs (ms)
command_timeout = 1000

# Insert blank line between shell prompts
add_newline = true

# Prompt format
format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$java\
$kubernetes\
$docker_context\
$cmd_duration\
$line_break\
$character"""

# --- Directory ---
[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"

# --- Git ---
[git_branch]
format = "on [$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# --- Command Duration ---
[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold yellow"

# --- Python / Virtualenv ---
[python]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "bold yellow"

# --- Node.js ---
[nodejs]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold green"

# --- Rust ---
[rust]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold red"

# --- Go ---
[golang]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold cyan"

# --- Java ---
[java]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold red"

# --- Kubernetes ---
[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
symbol = "☸ "
style = "bold blue"
detect_folders = []
detect_files = []

# --- Docker ---
[docker_context]
format = "via [$symbol$context]($style) "
symbol = " "
style = "bold blue"

# --- Prompt Character ---
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
