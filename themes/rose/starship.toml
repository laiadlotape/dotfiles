# Starship prompt — Rose theme (Rosé Pine)

command_timeout = 1000
add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$java\
$kubernetes\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold #9ccfd8"

[git_branch]
format = "on [$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold #eb6f92"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold #eb6f92"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold #f6c177"

[python]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "bold #f6c177"

[nodejs]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold #31748f"

[rust]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold #eb6f92"

[golang]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold #9ccfd8"

[java]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold #ea9a97"

[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
symbol = "☸ "
style = "bold #9ccfd8"
detect_folders = []
detect_files = []

[docker_context]
format = "via [$symbol$context]($style) "
symbol = " "
style = "bold #9ccfd8"

[character]
success_symbol = "[❯](bold #31748f)"
error_symbol = "[❯](bold #eb6f92)"
