# Starship prompt — Lavender theme (Catppuccin Mocha)

command_timeout = 1000
add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$java\
$kubernetes\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold #89b4fa"

[git_branch]
format = "on [$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold #cba6f7"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold #f38ba8"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "bold #f9e2af"

[python]
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
symbol = " "
style = "bold #f9e2af"

[nodejs]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold #a6e3a1"

[rust]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold #f38ba8"

[golang]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold #89dceb"

[java]
format = "via [$symbol($version )]($style)"
symbol = " "
style = "bold #fab387"

[kubernetes]
disabled = false
format = '[$symbol$context( \($namespace\))]($style) '
symbol = "☸ "
style = "bold #89b4fa"
detect_folders = []
detect_files = []

[docker_context]
format = "via [$symbol$context]($style) "
symbol = " "
style = "bold #89b4fa"

[character]
success_symbol = "[❯](bold #a6e3a1)"
error_symbol = "[❯](bold #f38ba8)"
