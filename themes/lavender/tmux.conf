# Lavender theme for tmux — Catppuccin Mocha

set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 35
set -g status-left "#[fg=#1e1e2e,bg=#cba6f7,bold] ✦ #S #[fg=#cba6f7,bg=#1e1e2e,nobold]"

set -g status-right-length 85
set -g status-right "#[fg=#45475a,bg=#1e1e2e]#[fg=#cdd6f4,bg=#45475a] ⬡ #h #[fg=#89b4fa,bg=#45475a]#[fg=#1e1e2e,bg=#89b4fa,bold] ◈ %b %d  %H:%M #[fg=#f9e2af,bg=#89b4fa]#[fg=#1e1e2e,bg=#f9e2af,bold] ◆ #{battery_percentage} "

setw -g window-status-format "#[fg=#45475a,bg=#1e1e2e]#[fg=#cdd6f4,bg=#45475a] #I:#W #[fg=#45475a,bg=#1e1e2e]"
setw -g window-status-current-format "#[fg=#cba6f7,bg=#1e1e2e]#[fg=#1e1e2e,bg=#cba6f7,bold] #I:#W #[fg=#cba6f7,bg=#1e1e2e]"
setw -g window-status-separator ""

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

set -g message-style "fg=#f9e2af,bg=#1e1e2e,bold"
set -g mode-style "fg=#1e1e2e,bg=#cba6f7"
set -g copy-mode-match-style "fg=#1e1e2e,bg=#f9e2af"
set -g copy-mode-current-match-style "fg=#1e1e2e,bg=#f38ba8"
