# Peach theme for tmux — Kanagawa Wave

set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1f1f28,fg=#dcd7ba"
set -g status-interval 5

set -g status-left-length 35
set -g status-left "#[fg=#1f1f28,bg=#ffa066,bold] ◆ #S #[fg=#ffa066,bg=#1f1f28,nobold]"

set -g status-right-length 140
set -g status-right "#[fg=#363646,bg=#1f1f28]#[fg=#dcd7ba,bg=#363646] ⬡ #h #[fg=#7e9cd8,bg=#363646]#[fg=#1f1f28,bg=#7e9cd8,bold] ◈ %b %d  %H:%M #[fg=#e6c384,bg=#7e9cd8]#[fg=#1f1f28,bg=#e6c384,bold] ✦ #(tmux-metrics) #[fg=#98bb6c,bg=#e6c384]#[fg=#1f1f28,bg=#98bb6c,bold] ◉ #(tmux-net-stat) "

setw -g window-status-format "#[fg=#363646,bg=#1f1f28]#[fg=#dcd7ba,bg=#363646] #I:#W #[fg=#363646,bg=#1f1f28]"
setw -g window-status-current-format "#[fg=#ffa066,bg=#1f1f28]#[fg=#1f1f28,bg=#ffa066,bold] #I:#W #[fg=#ffa066,bg=#1f1f28]"
setw -g window-status-separator ""

set -g pane-border-style "fg=#2a2a37"
set -g pane-active-border-style "fg=#ffa066"

set -g message-style "fg=#e6c384,bg=#1f1f28,bold"
set -g mode-style "fg=#1f1f28,bg=#ffa066"
set -g copy-mode-match-style "fg=#1f1f28,bg=#e6c384"
set -g copy-mode-current-match-style "fg=#1f1f28,bg=#e46876"
