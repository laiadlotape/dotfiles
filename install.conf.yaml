- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.zshrc: zsh/zshrc
    ~/.zsh/aliases: zsh/aliases
    ~/.zsh/functions: zsh/functions
    ~/.tmux.conf: tmux/tmux.conf
    ~/.fzf.zsh: fzf/fzf.zsh
    ~/.gitconfig: git/gitconfig

- shell:
    - [git submodule update --init --recursive, Installing submodules]
