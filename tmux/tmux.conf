# =============================================================================
# Tmux Configuration
# =============================================================================

# ---------------------------------------------------------------------------
# Prefix
# ---------------------------------------------------------------------------
# Use C-a as primary prefix, keep C-b as secondary
set -g prefix C-a
set -g prefix2 C-b
bind C-a send-prefix

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ---------------------------------------------------------------------------
# Mouse
# ---------------------------------------------------------------------------
set -g mouse on
# Toggle mouse mode with prefix + m
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# ---------------------------------------------------------------------------
# Vi mode
# ---------------------------------------------------------------------------
setw -g mode-keys vi

# Copy mode bindings (vi-style with system clipboard)
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
bind -T copy-mode-vi Escape send -X cancel

# Mouse copy: drag to select, release copies to clipboard, stays in copy mode
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe "xclip -in -selection clipboard"

# ---------------------------------------------------------------------------
# Pane navigation — Alt+arrows (prefix-free)
# ---------------------------------------------------------------------------
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Prefix fallback (vim-style hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---------------------------------------------------------------------------
# Pane resizing — Shift+Alt+arrows (prefix-free)
# ---------------------------------------------------------------------------
bind -n M-S-Left  resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up    resize-pane -U 5
bind -n M-S-Down  resize-pane -D 5

# Prefix fallback
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------------------------------------------------------------------------
# Splits — Alt+o vertical, Alt+v horizontal (prefix-free)
# ---------------------------------------------------------------------------
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-o split-window -v -c "#{pane_current_path}"

# Prefix fallback
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ---------------------------------------------------------------------------
# Window navigation — Alt+N switches to window N (prefix-free)
# ---------------------------------------------------------------------------
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ---------------------------------------------------------------------------
# Session picker — Alt+q (fzf-powered with preview)
# ---------------------------------------------------------------------------
bind -n M-q run-shell "~/.local/bin/tmux-sessionizer"

# ---------------------------------------------------------------------------
# Reload config
# ---------------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ---------------------------------------------------------------------------
# Status bar — powerline-style aesthetic theme
# ---------------------------------------------------------------------------
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1a1b26,nobold]"

# Right: hostname, date, time, battery
set -g status-right-length 80
set -g status-right "#[fg=#3b4261,bg=#1a1b26]#[fg=#a9b1d6,bg=#3b4261] #h #[fg=#7aa2f7,bg=#3b4261]#[fg=#1a1b26,bg=#7aa2f7,bold] %b %d  %H:%M #[fg=#e0af68,bg=#7aa2f7]#[fg=#1a1b26,bg=#e0af68,bold] #{battery_percentage} "

# Window status
setw -g window-status-format "#[fg=#3b4261,bg=#1a1b26]#[fg=#a9b1d6,bg=#3b4261] #I:#W #[fg=#3b4261,bg=#1a1b26]"
setw -g window-status-current-format "#[fg=#e0af68,bg=#1a1b26]#[fg=#1a1b26,bg=#e0af68,bold] #I:#W #[fg=#e0af68,bg=#1a1b26]"
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Message style
set -g message-style "fg=#e0af68,bg=#1a1b26,bold"

# ---------------------------------------------------------------------------
# TPM — Tmux Plugin Manager
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# ---------------------------------------------------------------------------
# Local overrides (not tracked in git)
# ---------------------------------------------------------------------------
if-shell "[ -f ~/.tmux.conf.local ]" "source-file ~/.tmux.conf.local"
