# kitty.conf — borderless, transparent, theme-aware
#
# Base configuration. Theme colors are loaded from the active dotfiles theme
# via an include directive at the bottom.

# ─── Font ────────────────────────────────────────────────────────────────────
# Match gnome-terminal system monospace font
font_family      Ubuntu Sans Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# ─── Window chrome ──────────────────────────────────────────────────────────
hide_window_decorations yes
window_padding_width    4
confirm_os_window_close 0

# ─── Transparency ───────────────────────────────────────────────────────────
background_opacity 0.90

# ─── Cursor ──────────────────────────────────────────────────────────────────
cursor_shape          beam
cursor_blink_interval 0.5
shell_integration     enabled

# ─── Scrollback ──────────────────────────────────────────────────────────────
scrollback_lines 100000

# ─── Bell ────────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0

# ─── Mouse ───────────────────────────────────────────────────────────────────
copy_on_select   clipboard
strip_trailing_spaces smart

# ─── URLs ────────────────────────────────────────────────────────────────────
detect_urls      yes
url_style        curly

# ─── Performance ─────────────────────────────────────────────────────────────
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# ─── Tab bar ─────────────────────────────────────────────────────────────────
tab_bar_style    powerline
tab_powerline_style slanted

# ─── Theme colors ────────────────────────────────────────────────────────────
# Loaded from the active dotfiles theme. The include path is a symlink
# managed by install.conf.yaml → ~/.config/dotfiles/themes/<active>/kitty.conf
include ~/.config/dotfiles/themes/current-kitty.conf
